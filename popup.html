<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    button {
      background: #f5c518;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
    }
    button:hover {
      background: #e5b515;
    }
    .message {
      color: #666;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="message" class="message">Loading...</div>
  <button id="playBtn">Go to Play</button>
  <script src="popup.js"></script>
</body>
</html>
